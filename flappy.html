<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flappy Bird · Arcade</title>
  <link rel="stylesheet" href="css/arcade.css" />
  <style>
    #flappyCanvas {
      border: 2px solid #4ade80;
      border-radius: 4px;
      background: #1a1a2e;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header id="game-header">
    <a href="index.html" id="back-btn">← Hub</a>
    <span id="game-title">Flappy Bird</span>
    <div id="score-display">Score: <span id="score">0</span> &nbsp;Best: <span id="best">0</span></div>
    <div id="player-badge"></div>
  </header>

  <div id="game-layout">
    <div id="game-area">
      <canvas id="flappyCanvas"></canvas>
      <div class="game-overlay" id="overlay">
        <h2 id="overlayTitle">Flappy Bird</h2>
        <p id="overlayMsg">Space · Click · Tap to flap</p>
        <button class="arcade-btn" id="startBtn">Play</button>
      </div>
    </div>
    <aside id="lb-panel">
      <div id="lb-panel-title">Leaderboard</div>
      <div id="lb-list"></div>
    </aside>
  </div>

  <div id="chat-container"></div>

  <script src="js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/chat.js"></script>

<script>
  const canvas = document.getElementById('flappyCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 320, H = 480;
  canvas.width = W; canvas.height = H;

  function resize() {
    const area = document.getElementById('game-area');
    const scale = Math.min((area.clientWidth - 24) / W, (area.clientHeight - 24) / H, 1.2);
    canvas.style.width  = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  resize(); window.addEventListener('resize', resize);

  const GRAVITY    = 0.38;
  const JUMP_VEL   = -7;
  const PIPE_W     = 56;
  const PIPE_GAP   = 140;
  const PIPE_SPEED = 2.4;
  const PIPE_EVERY = 88; // frames

  let bird, pipes, frameN, score, best = 0, running = false, raf;

  function initGame() {
    bird  = { x: 72, y: H / 2, vy: 0, r: 14 };
    pipes = [];
    frameN = 0;
    score  = 0;
    document.getElementById('score').textContent = 0;
  }

  function spawnPipe() {
    const topH = 60 + Math.random() * (H - PIPE_GAP - 120);
    pipes.push({ x: W + PIPE_W, topH });
  }

  function flap() {
    if (!running) return;
    bird.vy = JUMP_VEL;
  }

  function step() {
    frameN++;
    bird.vy += GRAVITY;
    bird.y  += bird.vy;

    if (frameN % PIPE_EVERY === 0) spawnPipe();

    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;
      if (pipes[i].x + PIPE_W < 0) { pipes.splice(i, 1); continue; }

      // Score when passing pipe centre
      if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
        pipes[i].scored = true;
        score++;
        if (score > best) { best = score; document.getElementById('best').textContent = best; }
        document.getElementById('score').textContent = score;
      }

      // Collision
      const p = pipes[i];
      if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W) {
        if (bird.y - bird.r < p.topH || bird.y + bird.r > p.topH + PIPE_GAP) {
          return gameOver();
        }
      }
    }

    // Floor / ceiling
    if (bird.y + bird.r >= H || bird.y - bird.r <= 0) return gameOver();
  }

  function draw() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(1, '#16213e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Pipes
    ctx.fillStyle = '#4ade80';
    pipes.forEach(p => {
      // Top pipe
      ctx.fillRect(p.x, 0, PIPE_W, p.topH);
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(p.x - 3, p.topH - 20, PIPE_W + 6, 20);
      // Bottom pipe
      ctx.fillStyle = '#4ade80';
      const botY = p.topH + PIPE_GAP;
      ctx.fillRect(p.x, botY, PIPE_W, H - botY);
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(p.x - 3, botY, PIPE_W + 6, 20);
    });

    // Bird body
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(Math.min(Math.max(bird.vy * 0.05, -0.5), 1.2));
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.r, bird.r * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wing
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.ellipse(-4, 4, 8, 5, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(6, -4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(7, -4, 2, 0, Math.PI * 2); ctx.fill();
    // Beak
    ctx.fillStyle = '#f97316';
    ctx.beginPath();
    ctx.moveTo(bird.r, -1); ctx.lineTo(bird.r + 8, 0); ctx.lineTo(bird.r, 3);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Ground
    ctx.fillStyle = '#166534';
    ctx.fillRect(0, H - 4, W, 4);
  }

  function loop() {
    if (!running) return;
    step();
    draw();
    raf = requestAnimationFrame(loop);
  }

  function startGame() {
    initGame();
    draw();
    document.getElementById('overlay').style.display = 'none';
    running = true;
    raf = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(raf);
    submitScore('flappy', score);
    draw();
    document.getElementById('overlayTitle').textContent = 'Game Over';
    document.getElementById('overlayMsg').textContent   = 'Score: ' + score;
    document.getElementById('startBtn').textContent     = 'Play Again';
    document.getElementById('overlay').style.display   = 'flex';
  }

  document.getElementById('startBtn').addEventListener('click', startGame);

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      if (!running) startGame(); else flap();
    }
  });
  canvas.addEventListener('click',     () => { if (!running) startGame(); else flap(); });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); if (!running) startGame(); else flap(); }, { passive: false });

  initGame(); draw();

  onAuthReady(function () {
    initLeaderboard('flappy', document.getElementById('lb-list'));
    initChat(document.getElementById('chat-container'));
  });
</script>
</body>
</html>
