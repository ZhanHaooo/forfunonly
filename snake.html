<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake · Nothing to do?</title>
  <link rel="stylesheet" href="css/arcade.css" />
  <style>
    #gameCanvas {
      border: 2px solid #4ade80;
      border-radius: 4px;
      background: #0a0a0a;
      max-width: 100%;
      max-height: 100%;
    }
    /* D-pad */
    #dpad {
      display: none;
      position: absolute;
      bottom: 12px;
      right: 12px;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
    }
    .dpad-btn {
      background: #1e1e1e;
      border: 2px solid #4ade80;
      border-radius: 8px;
      color: #4ade80;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s;
    }
    .dpad-btn:active { background: #4ade8033; }
    .dpad-empty { visibility: hidden; }
    @media (pointer: coarse) { #dpad { display: grid; } }
  </style>
</head>
<body>

  <header id="game-header">
    <a href="index.html" id="back-btn">← Hub</a>
    <span id="game-title">Snake</span>
    <div id="score-display">Score: <span id="score">0</span> &nbsp;Best: <span id="best">0</span></div>
    <div id="player-badge"></div>
  </header>

  <div id="game-layout">
    <div id="game-area">
      <canvas id="gameCanvas"></canvas>
      <div class="game-overlay" id="overlay">
        <h2 id="overlayTitle">Snake</h2>
        <p id="overlayMsg">Arrow keys · WASD · D-pad · Swipe</p>
        <button class="arcade-btn" id="startBtn">Play</button>
      </div>
      <div id="dpad">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btnUp">▲</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btnLeft">◀</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btnRight">▶</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btnDown">▼</button>
        <div class="dpad-empty"></div>
      </div>
    </div>
    <aside id="lb-panel">
      <div id="lb-panel-title">Leaderboard</div>
      <div id="lb-list"></div>
    </aside>
  </div>

  <div id="chat-container"></div>

  <!-- Firebase -->
  <script src="js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/chat.js"></script>

<script>
  const COLS = 20, ROWS = 20, CELL = 20;
  const canvas   = document.getElementById('gameCanvas');
  const ctx      = canvas.getContext('2d');
  const overlay  = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl  = document.getElementById('score');
  const bestEl   = document.getElementById('best');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg   = document.getElementById('overlayMsg');

  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  function resizeCanvas() {
    const area = document.getElementById('game-area');
    const maxW = Math.min(area.clientWidth - 24, area.clientHeight - 24, 480);
    const scale = maxW / canvas.width;
    canvas.style.width  = (canvas.width  * scale) + 'px';
    canvas.style.height = (canvas.height * scale) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const DIR = { UP:[0,-1], DOWN:[0,1], LEFT:[-1,0], RIGHT:[1,0] };
  const OPP = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
  let snake, dir, nextDir, food, score, best = 0, running = false, raf;

  function initGame() {
    snake   = [{ x:10, y:10 }, { x:9, y:10 }, { x:8, y:10 }];
    dir     = DIR.RIGHT;
    nextDir = DIR.RIGHT;
    score   = 0;
    scoreEl.textContent = 0;
    placeFood();
  }

  function placeFood() {
    const occ = new Set(snake.map(s => s.x + ',' + s.y));
    let fx, fy;
    do {
      fx = Math.floor(Math.random() * COLS);
      fy = Math.floor(Math.random() * ROWS);
    } while (occ.has(fx + ',' + fy));
    food = { x:fx, y:fy };
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y))             return gameOver();
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      if (score > best) { best = score; bestEl.textContent = best; }
      scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
    for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }
    ctx.fillStyle = '#f87171';
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
    ctx.fill();
    snake.forEach((seg, i) => {
      const t = 1 - i / snake.length;
      ctx.fillStyle = `hsl(142,70%,${25+30*t}%)`;
      ctx.fillRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2);
      if (i === 0) {
        ctx.fillStyle = '#111';
        const [ex1,ey1,ex2,ey2] = eyePos(dir, seg);
        ctx.beginPath(); ctx.arc(ex1,ey1,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2,ey2,2,0,Math.PI*2); ctx.fill();
      }
    });
  }

  function eyePos(d, seg) {
    const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
    if (d===DIR.RIGHT) return [cx+4,cy-3,cx+4,cy+3];
    if (d===DIR.LEFT)  return [cx-4,cy-3,cx-4,cy+3];
    if (d===DIR.UP)    return [cx-3,cy-4,cx+3,cy-4];
    return [cx-3,cy+4,cx+3,cy+4];
  }

  let lastTime = 0;
  const SPEED = 150;

  function loop(ts) {
    if (!running) return;
    if (ts - lastTime >= SPEED) { lastTime = ts; step(); }
    raf = requestAnimationFrame(loop);
  }

  function startGame() {
    initGame(); draw();
    overlay.style.display = 'none';
    running = true; lastTime = 0;
    raf = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(raf);
    submitScore('snake', score);
    overlayTitle.textContent = 'Game Over';
    overlayMsg.textContent   = 'Score: ' + score;
    startBtn.textContent     = 'Play Again';
    overlay.style.display    = 'flex';
  }

  startBtn.addEventListener('click', startGame);

  const keyMap = { ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT', w:'UP', s:'DOWN', a:'LEFT', d:'RIGHT', W:'UP', S:'DOWN', A:'LEFT', D:'RIGHT' };
  document.addEventListener('keydown', e => {
    const mapped = keyMap[e.key];
    if (!mapped) return;
    e.preventDefault();
    if (!running) { if (e.key==='Enter'||e.key===' ') startGame(); return; }
    if (OPP[mapped] !== dirName(dir)) nextDir = DIR[mapped];
  });

  function dirName(d) { return Object.keys(DIR).find(k => DIR[k]===d); }

  ['Up','Down','Left','Right'].forEach(k => {
    document.getElementById('btn'+k).addEventListener('click', () => {
      if (!running) return;
      const m = k.toUpperCase();
      if (OPP[m] !== dirName(dir)) nextDir = DIR[m];
    });
  });

  let tx=0, ty=0;
  canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
  canvas.addEventListener('touchend',   e => {
    if (!running) return;
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if (Math.abs(dx)<10&&Math.abs(dy)<10) return;
    const m = Math.abs(dx)>Math.abs(dy) ? (dx>0?'RIGHT':'LEFT') : (dy>0?'DOWN':'UP');
    if (OPP[m] !== dirName(dir)) nextDir = DIR[m];
  }, {passive:true});

  initGame(); draw();

  onAuthReady(function () {
    initLeaderboard('snake', document.getElementById('lb-list'));
    initChat(document.getElementById('chat-container'));
  });
</script>
</body>
</html>
